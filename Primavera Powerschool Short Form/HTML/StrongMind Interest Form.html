<div id="strongmind-interest-form">
  <link rel="stylesheet" crossorigin="anonymous" href="https://kit.fontawesome.com/9fc3e006bd.css" data-turbo-track="reload">
  <link rel="stylesheet" href="https://cdn.strongmind.com/backpack-ui/latest/assets/css/BackpackUI.css" data-turbo-track="reload">
  
  <div class="strongmind-ui bg-neutral-100 inline-block">
      
    <div class="sm-interest-form-container" style="display: flex; flex-direction: column; justify-content: space-between; gap: 10px; width: 500px; margin: 40px; padding: 10px;">
    <h1 class="sm-interest-form-header" style="text-align: center;">Let's Get Started!</h1>
    
    <div style="display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2rem;">
      <!-- New Customer Option -->
      <div class="sm-interest-form-option">
        <input type="submit" value="Brand New to Primavera Online" class="sm-interest-form-new-customer-button" data-choice="new_customer">
        <p style="margin: 0.5rem 0 0 0; font-size: 14px; color: #666; text-align: center; font-style: italic;">
          I've never submitted an application
        </p>
      </div>
      
      <!-- Returning Customer Option -->
      <div class="sm-interest-form-option">
        <input type="submit" value="Returning to Primavera Online" class="sm-interest-form-returning-customer-button" data-choice="returning_customer">
        <p style="margin: 0.5rem 0 0 0; font-size: 14px; color: #666; text-align: center; font-style: italic;">
          I've submitted an app and/or taken classes
        </p>
      </div>
    </div>
    
    <div style="margin-top: 2rem; padding-top: 1rem; text-align: center;">
      <p style="font-weight: bold; margin-bottom: 0.5rem; color: #333;">Not Sure?</p>
      <p style="color: #333; margin: 0;">
        <i class="fa-solid fa-phone" aria-hidden="true"></i> Call <a href="tel:4805300632" style="color: #007bff; text-decoration: underline;">480-530-0632</a> for help
      </p>
    </div>
  </div> 
  </div>
  
  </div>
